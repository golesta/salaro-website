<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salaro — Homepage v3 (logo + animation + dark footer)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Header (now subtly tinted to distinguish from page) ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 64px;
      background: var(--bg-warm);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: saturate(120%);
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-mark { display: block; }
    .logo-word {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 500;
      color: var(--ink-strong); letter-spacing: -0.01em;
      line-height: 1;
    }
    .nav { display: flex; gap: 36px; font-size: 14px; color: var(--ink-strong); }
    .nav a { transition: color 200ms ease; }
    .nav a:hover { color: var(--accent); }
    .nav a.active { color: var(--accent); }

    /* ── Hero (tighter top spacing per feedback #4) ── */
    .hero {
      padding: 56px 64px 40px;
      max-width: 1320px; margin: 0 auto;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: end;
      margin-bottom: 40px;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: 96px; font-weight: 400;
      line-height: 0.98; letter-spacing: -0.025em;
      color: var(--ink-strong);
      margin: 20px 0 0;
    }
    .hero h1 em.static-em { font-style: italic; color: var(--accent-ink); font-weight: 400; }

    /* Rotating italicised word — subtle vertical-slide crossfade */
    .rotator {
      display: inline-block;
      position: relative;
      vertical-align: baseline;
      min-width: 6ch;  /* widest candidate sets the slot */
    }
    .rotator-slot {
      display: inline-block;
      font-style: italic;
      color: var(--accent-ink);
      font-weight: 400;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 500ms ease, transform 500ms ease;
    }
    .rotator-slot.leaving {
      opacity: 0;
      transform: translateY(-12px);
    }
    .rotator-slot.entering {
      opacity: 0;
      transform: translateY(12px);
    }

    .hero-right p {
      font-family: var(--font-display);
      font-size: 22px; line-height: 1.5;
      color: var(--ink-soft);
      font-style: italic; font-weight: 400;
      margin: 0 0 28px; max-width: 38ch;
    }
    .ctas { display: flex; gap: 16px; align-items: center; }
    .btn-primary {
      background: var(--ink-strong); color: var(--bg);
      padding: 14px 24px; border-radius: 2px;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.22em; text-transform: uppercase;
      border: 1px solid var(--ink-strong);
      transition: background 200ms ease, border-color 200ms ease;
    }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); }
    .btn-secondary {
      color: var(--ink-strong);
      padding: 14px 4px;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.22em; text-transform: uppercase;
      border-bottom: 1px solid var(--ink-strong);
      transition: color 200ms ease, border-color 200ms ease;
    }
    .btn-secondary:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Diagram block ── */
    .diagram-block {
      border-top: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      padding: 56px 0 48px;
      margin: 0;
      background: var(--bg-warm);
    }
    .diagram-inner { max-width: 1320px; margin: 0 auto; padding: 0 64px; }
    .diagram-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 32px;
    }
    .diagram-head h2 {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 500;
      color: var(--ink-strong);
      margin: 0; max-width: 32ch; letter-spacing: -0.01em;
    }
    .diagram-head h2 em { font-style: italic; color: var(--accent-ink); font-weight: 400; }

    /* ── Services ── */
    .services {
      max-width: 1320px; margin: 0 auto;
      padding: 96px 64px 64px;
      border-bottom: 1px solid var(--line-soft);
    }
    .services-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 48px;
    }
    .services-head h2 {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--ink-strong);
      margin: 0; max-width: 22ch;
    }
    .services-head h2 em { font-style: italic; color: var(--accent-ink); }
    .service-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 48px;
    }
    .service {
      border-top: 1px solid var(--ink-strong);
      padding-top: 20px;
    }
    .service-num {
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.22em;
      color: var(--ink-faint); text-transform: uppercase;
      display: block; margin-bottom: 14px;
    }
    .service h4 {
      font-family: var(--font-display);
      font-size: 24px; font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--ink-strong);
      margin: 0 0 12px;
    }
    .service h4 em { font-style: italic; color: var(--accent-ink); font-weight: 400; }
    .service p {
      font-family: var(--font-body);
      font-size: 15px; line-height: 1.6;
      color: var(--ink-soft);
      margin: 0 0 16px;
    }
    .service-meta {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    /* ── Proof bar ── */
    .proof {
      max-width: 1320px; margin: 0 auto;
      padding: 48px 64px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 40px; border-bottom: 1px solid var(--line-soft);
    }
    .proof-item {
      font-family: var(--font-display);
      font-size: 18px; color: var(--ink-soft);
      font-style: italic;
    }
    .proof-num {
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.22em;
      color: var(--ink-faint); text-transform: uppercase;
      display: block; margin-bottom: 4px; font-style: normal;
    }

    /* ── Manifesto strip ── */
    .manifesto {
      max-width: 1320px; margin: 0 auto;
      padding: 96px 64px;
      display: grid; grid-template-columns: 280px 1fr; gap: 64px;
    }
    .manifesto h3 {
      font-family: var(--font-display);
      font-size: 36px; line-height: 1.15; font-weight: 400;
      color: var(--ink-strong); margin: 0; letter-spacing: -0.01em;
    }
    .manifesto h3 em { color: var(--accent-ink); font-style: italic; }
    .manifesto-num {
      font-family: var(--font-mono);
      font-size: 11px; letter-spacing: 0.22em;
      color: var(--accent); text-transform: uppercase;
    }
    .manifesto-line { border-top: 1px solid var(--line-soft); padding-top: 16px; margin-bottom: 12px; }

    /* ── Dark footer (feedback #2) ── */
    .footer-dark {
      background: oklch(0.16 0.02 60);   /* near-ink, slightly warmer than pure ink */
      color: oklch(0.72 0.02 60);
      padding: 80px 64px 32px;
      margin-top: 0;
    }
    .footer-grid {
      max-width: 1320px; margin: 0 auto;
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
      gap: 64px;
      padding-bottom: 56px;
      border-bottom: 1px solid oklch(0.28 0.02 60);
    }
    .footer-brand .logo-word { color: oklch(0.92 0.02 60); }
    .footer-brand-tag {
      font-family: var(--font-display); font-style: italic;
      font-size: 16px; line-height: 1.5;
      color: oklch(0.72 0.02 60);
      margin: 16px 0 0; max-width: 28ch;
    }
    .footer-col-title {
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .footer-col a {
      color: oklch(0.85 0.015 60);
      font-family: var(--font-body); font-size: 14px;
      transition: color 200ms ease;
    }
    .footer-col a:hover { color: var(--accent); }
    .footer-meta {
      max-width: 1320px; margin: 0 auto;
      padding-top: 24px;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: oklch(0.55 0.02 60);
    }

    /* ── Reveal-on-scroll (feedback #1, subtle) ── */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 700ms ease, transform 700ms ease;
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    @media (prefers-reduced-motion: reduce) {
      .reveal { opacity: 1; transform: none; transition: none; }
      .rotator-slot { transition: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="agent-factory.jsx"></script>
  <script type="text/babel" src="logo-mark.jsx"></script>

  <script type="text/babel">
    /* ─── Rotating italicised hero word ───────────────────────────── */
    const ROTATIONS = [
      'template',
      'Wix site',
      'WordPress install',
      'Squarespace',
      'starter kit',
    ];

    function HeroRotator() {
      const [idx, setIdx] = React.useState(0);
      const [phase, setPhase] = React.useState('in');  // 'in' | 'leaving' | 'entering'

      React.useEffect(() => {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let timer;
        const cycle = () => {
          setPhase('leaving');
          setTimeout(() => {
            setIdx(i => (i + 1) % ROTATIONS.length);
            setPhase('entering');
            requestAnimationFrame(() => requestAnimationFrame(() => setPhase('in')));
          }, 500);
          timer = setTimeout(cycle, 5000);
        };
        timer = setTimeout(cycle, 5000);
        return () => clearTimeout(timer);
      }, []);

      const cls = 'rotator-slot' + (phase === 'in' ? '' : ' ' + phase);
      return (
        <span className="rotator">
          <span className={cls}>{ROTATIONS[idx]}</span>
        </span>
      );
    }

    /* ─── Reveal-on-scroll wrapper ─────────────────────────────────── */
    function Reveal({ children, delay = 0 }) {
      const ref = React.useRef(null);
      const [shown, setShown] = React.useState(false);
      React.useEffect(() => {
        if (!ref.current) return;
        const io = new IntersectionObserver(
          ([e]) => { if (e.isIntersecting) { setShown(true); io.disconnect(); } },
          { threshold: 0.12 }
        );
        io.observe(ref.current);
        return () => io.disconnect();
      }, []);
      return (
        <div ref={ref} className={'reveal' + (shown ? ' in' : '')} style={{ transitionDelay: delay + 'ms' }}>
          {children}
        </div>
      );
    }

    function App() {
      return (
        <>
          {/* Header — subtly tinted, sticky, with new logo mark */}
          <header className="header">
            <a href="Salaro Homepage.html" className="logo" aria-label="Salaro home">
              <LogoMark size={22} />
              <span className="logo-word">Salaro</span>
            </a>
            <nav className="nav">
              <a href="Salaro Homepage.html" className="active">Home</a>
              <a href="Practice.html">Practice</a>
              <a href="Work.html">Work</a>
              <a href="Studio.html">Studio</a>
              <a href="Writing.html">Writing</a>
              <a href="Contact.html">Contact</a>
            </nav>
          </header>

          {/* Hero — tighter top padding, rotating italic word */}
          <section className="hero">
            <div className="hero-grid">
              <div>
                <div className="eyebrow">A UK web consultancy · Practising since 1995</div>
                <h1>
                  For UK businesses that have outgrown a <HeroRotator />.
                </h1>
              </div>
              <div className="hero-right">
                <p>
                  We combine three decades of engineering judgement with
                  pragmatic AI-enabled delivery — building, migrating and
                  advising for ambitious SMEs.
                </p>
                <div className="ctas">
                  <a href="Contact.html" className="btn-primary">Start a conversation</a>
                  <a href="Practice.html" className="btn-secondary">See how we build →</a>
                </div>
              </div>
            </div>
          </section>

          {/* Live diagram */}
          <Reveal>
            <section className="diagram-block">
              <div className="diagram-inner">
                <div className="diagram-head">
                  <h2>Agent factory — <em>how we ship</em>.</h2>
                  <span className="eyebrow">Live · auto-running</span>
                </div>
                <AgentFactoryDiagram width={1200} height={400} />
              </div>
            </section>
          </Reveal>

          {/* Services */}
          <Reveal>
            <section className="services">
              <div className="services-head">
                <h2>What we do <em>for clients</em>.</h2>
                <span className="eyebrow">Services</span>
              </div>
              <div className="service-grid">
                <div className="service">
                  <span className="service-num">01 · Build</span>
                  <h4><em>Build</em> — practical product engineering.</h4>
                  <p>
                    We design and build new web platforms, agent systems
                    and on-premise AI deployments. Composable, testable,
                    sustainable.
                  </p>
                  <div className="service-meta">Build · Projects</div>
                </div>
                <div className="service">
                  <span className="service-num">02 · Migrate</span>
                  <h4><em>Migrate</em> — DNN and legacy lifts.</h4>
                  <p>
                    We move organisations off DNN, EP, and ageing
                    WordPress onto modern stacks — Next.js, Vercel,
                    headless WordPress — without losing content, SEO or
                    customers.
                  </p>
                  <div className="service-meta">Migrate · Modernisation</div>
                </div>
                <div className="service">
                  <span className="service-num">03 · Advise</span>
                  <h4><em>Advise</em> — strategy, audits, pilots.</h4>
                  <p>
                    Short, decisive scoping engagements that produce a
                    written brief and a clear next step. If we go on to
                    build it, the fee credits the project.
                  </p>
                  <div className="service-meta">Advise · Workshops</div>
                </div>
              </div>
            </section>
          </Reveal>

          {/* Proof bar */}
          <Reveal>
            <section className="proof">
              <div className="proof-item">
                <span className="proof-num">01 · Tenure</span>
                30+ years building for the web.
              </div>
              <div className="proof-item">
                <span className="proof-num">02 · Clients</span>
                Active across four countries.
              </div>
              <div className="proof-item">
                <span className="proof-num">03 · Ships</span>
                We ship in weeks, not quarters.
              </div>
              <div className="proof-item">
                <span className="proof-num">04 · Honest</span>
                We're opinionated and selective.
              </div>
            </section>
          </Reveal>

          {/* Manifesto */}
          <Reveal>
            <section className="manifesto">
              <div>
                <div className="manifesto-line"><span className="manifesto-num">A note · 01</span></div>
                <p style={{ fontFamily: 'var(--font-mono)', fontSize: '11px', letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-faint)', margin: 0 }}>
                  Practical judgement<br/>over throughput.
                </p>
              </div>
              <div>
                <h3>
                  We place human <em>judgment</em> where it matters — on
                  architecture, trade-offs, and what to build at all. The
                  boring middle is automated. <em>The decisions stay human.</em>
                </h3>
              </div>
            </section>
          </Reveal>

          {/* Dark footer — feedback #2 */}
          <footer className="footer-dark">
            <div className="footer-grid">
              <div className="footer-brand">
                <a href="Salaro Homepage.html" className="logo" style={{ textDecoration: 'none' }}>
                  <LogoMark size={24} darkBackground />
                  <span className="logo-word">Salaro</span>
                </a>
                <p className="footer-brand-tag">
                  A UK web consultancy. Practising since 1995, AI-native since 2026.
                </p>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Practice</div>
                <ul>
                  <li><a href="Practice.html#build">Build</a></li>
                  <li><a href="Practice.html#migrate">Migrate</a></li>
                  <li><a href="Practice.html#advise">Advise</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Studio</div>
                <ul>
                  <li><a href="Studio.html#founder">Founder</a></li>
                  <li><a href="Studio.html#team">Team</a></li>
                  <li><a href="Studio.html#values">Values</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Work</div>
                <ul>
                  <li><a href="Work.html#recent">Recent projects</a></li>
                  <li><a href="Work.html#archive">Archive</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Contact</div>
                <ul>
                  <li><a href="mailto:hello@salaro.com">hello@salaro.com</a></li>
                  <li><a href="Studio.html">Guildford, Surrey</a></li>
                  <li><a href="#">LinkedIn</a></li>
                </ul>
              </div>
            </div>
            <div className="footer-meta">
              <div>© 2026 Salaro Ltd · Registered in England &amp; Wales · Guildford, Surrey</div>
              <div>Practising since 1995</div>
            </div>
          </footer>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
