<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Salaro — Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 64px;
      background: var(--bg-warm);
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; z-index: 20;
      backdrop-filter: saturate(120%);
    }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .logo-mark { display: block; }
    .logo-word { font-family: var(--font-display); font-size: 26px; font-weight: 500; color: var(--ink-strong); letter-spacing: -0.01em; line-height: 1; }
    .nav { display: flex; gap: 36px; font-size: 14px; color: var(--ink-strong); }
    .nav a { transition: color 200ms ease; }
    .nav a:hover { color: var(--accent); }
    .nav a.active { color: var(--accent); }

    .page-hero { max-width: 1320px; margin: 0 auto; padding: 64px 64px 56px; border-bottom: 1px solid var(--line-soft); }
    .page-hero .eyebrow { margin-bottom: 28px; }
    .page-hero h1 { font-family: var(--font-display); font-size: 84px; font-weight: 400; line-height: 0.98; letter-spacing: -0.025em; color: var(--ink-strong); margin: 0 0 32px; max-width: 18ch; }
    .page-hero h1 em { font-style: italic; color: var(--accent-ink); font-weight: 400; }
    .page-hero .lede { font-family: var(--font-display); font-style: italic; font-size: 22px; line-height: 1.5; color: var(--ink-soft); max-width: 56ch; margin: 0; }

    /* ── Dark footer ── */
    .footer-dark {
      background: oklch(0.16 0.02 60);
      color: oklch(0.72 0.02 60);
      padding: 80px 64px 32px;
    }
    .footer-grid {
      max-width: 1320px; margin: 0 auto;
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr;
      gap: 64px;
      padding-bottom: 56px;
      border-bottom: 1px solid oklch(0.28 0.02 60);
    }
    .footer-brand .logo-word { color: oklch(0.92 0.02 60); }
    .footer-brand-tag { font-family: var(--font-display); font-style: italic; font-size: 16px; line-height: 1.5; color: oklch(0.72 0.02 60); margin: 16px 0 0; max-width: 28ch; }
    .footer-col-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent); margin-bottom: 18px; }
    .footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .footer-col a { color: oklch(0.85 0.015 60); font-family: var(--font-body); font-size: 14px; transition: color 200ms ease; }
    .footer-col a:hover { color: var(--accent); }
    .footer-meta { max-width: 1320px; margin: 0 auto; padding-top: 24px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: oklch(0.55 0.02 60); }

    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 700ms ease, transform 700ms ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; transition: none; } }

    .studio-section { max-width: 1320px; margin: 0 auto; padding: 96px 64px; border-bottom: 1px solid var(--line-soft); display: grid; grid-template-columns: 280px 1fr; gap: 64px; }
    .studio-section:last-of-type { border-bottom: none; }
    .studio-section .side-num { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em; color: var(--accent); text-transform: uppercase; }
    .studio-section .side-line { border-top: 1px solid var(--line-soft); padding-top: 16px; margin-bottom: 16px; }
    .studio-section .side-meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); line-height: 1.8; }
    .studio-section h2 { font-family: var(--font-display); font-size: 44px; font-weight: 400; line-height: 1.05; letter-spacing: -0.015em; color: var(--ink-strong); margin: 0 0 24px; max-width: 22ch; }
    .studio-section h2 em { font-style: italic; color: var(--accent-ink); }
    .studio-section p { font-family: var(--font-display); font-style: italic; font-size: 20px; line-height: 1.55; color: var(--ink-soft); max-width: 56ch; margin: 0 0 18px; }
    .values { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; margin-top: 24px; }
    .value { border-top: 1px solid var(--ink-strong); padding-top: 16px; }
    .value-num { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); display: block; margin-bottom: 10px; }
    .value-title { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: -0.005em; color: var(--ink-strong); margin: 0 0 8px; }
    .value-title em { font-style: italic; color: var(--accent-ink); font-weight: 400; }
    .value-body { font-family: var(--font-body); font-size: 15px; line-height: 1.55; color: var(--ink-soft); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="logo-mark.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <>
          
          <header className="header">
            <a href="Salaro Homepage.html" className="logo" aria-label="Salaro home">
              <LogoMark size={22} />
              <span className="logo-word">Salaro</span>
            </a>
            <nav className="nav">
              <a href="Salaro Homepage.html">Home</a>
              <a href="Practice.html">Practice</a>
              <a href="Work.html">Work</a>
              <a href="Studio.html" className="active">Studio</a>
              <a href="Writing.html">Writing</a>
              <a href="Contact.html">Contact</a>
            </nav>
          </header>
          
          <section className="page-hero">
            <div className="eyebrow">Studio · About</div>
            <h1>A <em>small UK practice</em>, deliberately.</h1>
            <p className="lede">Salaro is a working studio, not an agency. One founder, a small senior team, and the tools that make 2026 possible.</p>
          </section>

          <section className="studio-section">
            <div>
              <div className="side-line"><span className="side-num">01 · Founder</span></div>
              <div className="side-meta">UK based<br/>Practising since 2000<br/>Available for calls<br/>By appointment</div>
            </div>
            <div>
              <h2>One pair of hands at the helm.</h2>
              <p>Salaro was founded in 2000 and ran as a web consultancy through to 2015 — public sites, DNN platforms, intranets, the work of the day. After a decade away from agency life, the founder returned in 2026 with a question: <em>what does a one-person consultancy look like when the tools have moved this far?</em></p>
              <p>This site is part of the answer. The work is the rest.</p>
              <p style={{ fontFamily: 'var(--font-mono)', fontSize: '12px', letterSpacing: '0.18em', textTransform: 'uppercase', color: 'var(--ink-faint)', fontStyle: 'normal' }}>
                <span style={{ color: 'var(--accent)' }}>Note for Claude Code:</span> replace this placeholder with the founder bio &amp; photo when ready.
              </p>
            </div>
          </section>

          <section className="studio-section">
            <div>
              <div className="side-line"><span className="side-num">02 · Team</span></div>
              <div className="side-meta">UK lead<br/>Senior team in India<br/>Async-first<br/>No juniors on client work</div>
            </div>
            <div>
              <h2>A <em>UK lead</em>, a <em>senior team</em> abroad, and AI doing the boring middle.</h2>
              <p>The lead and the client conversations sit in the UK. The engineering bench sits in India — a small group of people we have worked with for years. AI tools sit between them, drafting and reviewing so the humans can spend time on decisions, not boilerplate.</p>
            </div>
          </section>

          <section className="studio-section">
            <div>
              <div className="side-line"><span className="side-num">03 · Values</span></div>
              <div className="side-meta">How we operate<br/>Plain language<br/>Fixed price<br/>No project managers</div>
            </div>
            <div>
              <h2>Four things we hold to.</h2>
              <div className="values">
                <div className="value"><span className="value-num">01</span><h3 className="value-title">Small on <em>purpose</em>.</h3><div className="value-body">We do not want to be a 40-person agency. We want to do the work, well, and go home.</div></div>
                <div className="value"><span className="value-num">02</span><h3 className="value-title">You own <em>everything</em>.</h3><div className="value-body">The code lives in your GitHub. The deployment lives in your Vercel. We do not hold your business hostage.</div></div>
                <div className="value"><span className="value-num">03</span><h3 className="value-title">Plain <em>numbers</em>.</h3><div className="value-body">Fixed proposals, fixed prices. If a project is risky we say so, and price it accordingly.</div></div>
                <div className="value"><span className="value-num">04</span><h3 className="value-title">Judgment, not <em>throughput</em>.</h3><div className="value-body">Agents draft. Humans decide. That is the entire method.</div></div>
              </div>
            </div>
          </section>

          
          <footer className="footer-dark">
            <div className="footer-grid">
              <div className="footer-brand">
                <a href="Salaro Homepage.html" className="logo" style={{ textDecoration: 'none' }}>
                  <LogoMark size={24} darkBackground />
                  <span className="logo-word">Salaro</span>
                </a>
                <p className="footer-brand-tag">A UK web consultancy. Practising since 1995, AI-native since 2026.</p>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Practice</div>
                <ul>
                  <li><a href="Practice.html#build">Build</a></li>
                  <li><a href="Practice.html#migrate">Migrate</a></li>
                  <li><a href="Practice.html#advise">Advise</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Studio</div>
                <ul>
                  <li><a href="Studio.html#founder">Founder</a></li>
                  <li><a href="Studio.html#team">Team</a></li>
                  <li><a href="Studio.html#values">Values</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Work</div>
                <ul>
                  <li><a href="Work.html#recent">Recent projects</a></li>
                  <li><a href="Work.html#archive">Archive</a></li>
                </ul>
              </div>
              <div className="footer-col">
                <div className="footer-col-title">Contact</div>
                <ul>
                  <li><a href="mailto:hello@salaro.com">hello@salaro.com</a></li>
                  <li><a href="Studio.html">Guildford, Surrey</a></li>
                  <li><a href="#">LinkedIn</a></li>
                </ul>
              </div>
            </div>
            <div className="footer-meta">
              <div>© 2026 Salaro Ltd · Registered in England &amp; Wales · Guildford, Surrey</div>
              <div>Practising since 1995</div>
            </div>
          </footer>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
